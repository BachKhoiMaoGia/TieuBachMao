<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Lazada...</title>
  <meta http-equiv="refresh" content="0;url=lazada.html">
  <script>
    (function () {
      var path = window.location.pathname;
      var targetPath = path;

      if (/\/shopee\//.test(targetPath)) {
        targetPath = targetPath.replace('/shopee/', '/lazada/');
      }
      if (/\/shopee\.html$/.test(targetPath)) {
        targetPath = targetPath.replace(/\/shopee\.html$/, '/lazada.html');
      }

      if (targetPath === path) {
        targetPath = 'lazada.html';
      }

      var target = targetPath + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Dang chuyen den Lazada...</p>
</body>
</html>
